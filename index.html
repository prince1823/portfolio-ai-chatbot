  <style>
    /* Boot screen */
    .boot-screen {
      position: fixed;
      inset: 0;
      z-index: 10000;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      opacity: 0;
      pointer-events: none;
    }
    .boot-screen.active {
      opacity: 1;
      pointer-events: all;
    }
    .boot-face-wrap {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    .boot-face-wrap.visible { opacity: 1; }
    .boot-face {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      filter: grayscale(100%) brightness(1.1);
    }
    .boot-bar-wrap {
      width: 200px;
      height: 3px;
      background: #222;
      border-radius: 2px;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .boot-bar-wrap.visible { opacity: 1; }
    .boot-bar {
      height: 100%;
      width: 0%;
      background: #fff;
      border-radius: 2px;
      transition: width 0.15s ease;
    }
    .boot-flash {
      position: fixed;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
    }
    /* Finder springs in */
    .finder {
      transform-origin: center center;
    }
    .finder.boot-hidden {
      opacity: 0;
      transform: scale(0.85);
      filter: blur(6px);
    }
    .finder.boot-spring {
      opacity: 1;
      transform: scale(1);
      filter: blur(0);
      transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.25s ease;
    }
  </style>

  <script>
    // Mac startup chime — C major 9th chord via Web Audio
    function playStartupChime() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const freqs = [130.81, 164.81, 196.00, 220.00, 261.63]; // C3 E3 G3 A3 C4
        freqs.forEach((freq, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.type = 'sine';
          osc.frequency.setValueAtTime(freq, ctx.currentTime);
          gain.gain.setValueAtTime(0, ctx.currentTime);
          gain.gain.linearRampToValueAtTime(0.12, ctx.currentTime + 0.05);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 2.2);
          osc.start(ctx.currentTime);
          osc.stop(ctx.currentTime + 2.4);
        });
      } catch(e) {}
    }

    // Staggered progress bar fill (mimics Mac boot stutter)
    async function fillBar() {
      const bar = document.getElementById('bootBar');
      const steps = [
        { pct: 18, dur: 180 }, { pct: 0,  dur: 120 },
        { pct: 31, dur: 220 }, { pct: 0,  dur: 80  },
        { pct: 49, dur: 160 }, { pct: 0,  dur: 200 },
        { pct: 63, dur: 140 }, { pct: 0,  dur: 60  },
        { pct: 78, dur: 180 }, { pct: 0,  dur: 100 },
        { pct: 88, dur: 120 }, { pct: 0,  dur: 140 },
        { pct: 100,dur: 200 },
      ];
      let current = 0;
      for (const step of steps) {
        if (step.pct === 0) { await sleep(step.dur); continue; }
        current = step.pct;
        bar.style.width = current + '%';
        await sleep(step.dur);
      }
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    async function runBootSequence() {
      const boot = document.getElementById('bootScreen');
      const faceWrap = document.querySelector('.boot-face-wrap');
      const barWrap = document.querySelector('.boot-bar-wrap');
      const flash = document.getElementById('bootFlash');
      const finder = document.querySelector('.finder');

      // Hide finder initially
      finder.classList.add('boot-hidden');

      // Show boot screen
      boot.classList.add('active');
      await sleep(300);

      // Face fades in + chime
      faceWrap.classList.add('visible');
      playStartupChime();
      await sleep(500);

      // Bar appears and fills
      barWrap.classList.add('visible');
      await fillBar();
      await sleep(200);

      // Screen flash to white
      flash.style.transition = 'opacity 0.15s ease';
      flash.style.opacity = '1';
      await sleep(150);
      flash.style.transition = 'opacity 0.1s ease';
      flash.style.opacity = '0';
      boot.style.transition = 'opacity 0.2s ease';
      boot.style.opacity = '0';
      await sleep(200);

      // Boot screen gone, finder springs in
      boot.style.display = 'none';
      finder.classList.remove('boot-hidden');
      finder.classList.add('boot-spring');
    }

    // Wait for user click to unlock audio, then run boot sequence
    const entrySplash = document.getElementById('entrySplash');
    const enterBtn = document.getElementById('enterBtn');

    function startBoot() {
      entrySplash.classList.add('hidden');
      setTimeout(() => {
        entrySplash.style.display = 'none';
        runBootSequence();
      }, 400);
    }

    enterBtn.addEventListener('click', startBoot);
    entrySplash.addEventListener('click', startBoot);
  </script>
